# Drop-in for the router/network instance: marsad@network only makes outbound HTTP
# to the router and to agent endpoints — it needs none of the host-mode privileges.
# Install to: /etc/systemd/system/marsad@network.service.d/override.conf
# (install.sh does this for you when you install the "network" instance.)
[Service]
# Drop every host-mode capability (clear, then set empty).
CapabilityBoundingSet=
AmbientCapabilities=
# Run as an ephemeral unprivileged user instead of root.
User=
DynamicUser=yes
# Only needs IP egress (no raw sockets / netlink / packet).
RestrictAddressFamilies=AF_INET AF_INET6
